<svg width="1200" height="630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00ff88;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#4488ff;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="bg-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0a0f;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0f0f1a;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg-grad)"/>

  <!-- Grid lines -->
  <g opacity="0.05" stroke="#fff" stroke-width="1">
    <line x1="0" y1="0" x2="0" y2="630"/><line x1="60" y1="0" x2="60" y2="630"/>
    <line x1="120" y1="0" x2="120" y2="630"/><line x1="180" y1="0" x2="180" y2="630"/>
    <line x1="240" y1="0" x2="240" y2="630"/><line x1="300" y1="0" x2="300" y2="630"/>
    <line x1="360" y1="0" x2="360" y2="630"/><line x1="420" y1="0" x2="420" y2="630"/>
    <line x1="480" y1="0" x2="480" y2="630"/><line x1="540" y1="0" x2="540" y2="630"/>
    <line x1="600" y1="0" x2="600" y2="630"/><line x1="660" y1="0" x2="660" y2="630"/>
    <line x1="720" y1="0" x2="720" y2="630"/><line x1="780" y1="0" x2="780" y2="630"/>
    <line x1="840" y1="0" x2="840" y2="630"/><line x1="900" y1="0" x2="900" y2="630"/>
    <line x1="960" y1="0" x2="960" y2="630"/><line x1="1020" y1="0" x2="1020" y2="630"/>
    <line x1="1080" y1="0" x2="1080" y2="630"/><line x1="1140" y1="0" x2="1140" y2="630"/>
    <line x1="0" y1="60" x2="1200" y2="60"/><line x1="0" y1="120" x2="1200" y2="120"/>
    <line x1="0" y1="180" x2="1200" y2="180"/><line x1="0" y1="240" x2="1200" y2="240"/>
    <line x1="0" y1="300" x2="1200" y2="300"/><line x1="0" y1="360" x2="1200" y2="360"/>
    <line x1="0" y1="420" x2="1200" y2="420"/><line x1="0" y1="480" x2="1200" y2="480"/>
    <line x1="0" y1="540" x2="1200" y2="540"/>
  </g>

  <!-- Glow effect -->
  <ellipse cx="600" cy="200" rx="500" ry="300" fill="#00ff88" opacity="0.04"/>
  <ellipse cx="800" cy="400" rx="400" ry="250" fill="#4488ff" opacity="0.03"/>

  <!-- Accent bar top -->
  <rect x="0" y="0" width="1200" height="4" fill="url(#grad)"/>

  <!-- Title -->
  <text x="100" y="200" font-family="system-ui, -apple-system, sans-serif" font-size="72" font-weight="900" fill="#e4e4ef" letter-spacing="-2">
    solana-mcp
  </text>

  <!-- Subtitle -->
  <text x="100" y="260" font-family="system-ui, -apple-system, sans-serif" font-size="28" fill="#8888a0" font-weight="500">
    AI Agent Infrastructure for Solana
  </text>

  <!-- Stats boxes -->
  <g transform="translate(100, 310)">
    <rect x="0" y="0" width="160" height="90" rx="12" fill="#12121a" stroke="#1e1e30" stroke-width="1"/>
    <text x="80" y="45" font-family="monospace" font-size="36" font-weight="900" fill="url(#grad)" text-anchor="middle">38</text>
    <text x="80" y="72" font-family="system-ui" font-size="14" fill="#8888a0" text-anchor="middle">Tools</text>
  </g>

  <g transform="translate(280, 310)">
    <rect x="0" y="0" width="160" height="90" rx="12" fill="#12121a" stroke="#1e1e30" stroke-width="1"/>
    <text x="80" y="45" font-family="monospace" font-size="36" font-weight="900" fill="url(#grad)" text-anchor="middle">10</text>
    <text x="80" y="72" font-family="system-ui" font-size="14" fill="#8888a0" text-anchor="middle">Prompts</text>
  </g>

  <g transform="translate(460, 310)">
    <rect x="0" y="0" width="160" height="90" rx="12" fill="#12121a" stroke="#1e1e30" stroke-width="1"/>
    <text x="80" y="45" font-family="monospace" font-size="36" font-weight="900" fill="url(#grad)" text-anchor="middle">7</text>
    <text x="80" y="72" font-family="system-ui" font-size="14" fill="#8888a0" text-anchor="middle">Modules</text>
  </g>

  <!-- Module tags -->
  <g transform="translate(100, 440)">
    <rect x="0" y="0" width="80" height="32" rx="8" fill="rgba(0,255,136,0.08)" stroke="rgba(0,255,136,0.2)" stroke-width="1"/>
    <text x="40" y="21" font-family="monospace" font-size="12" fill="#00ff88" text-anchor="middle" font-weight="600">Wallet</text>

    <rect x="96" y="0" width="90" height="32" rx="8" fill="rgba(0,255,136,0.08)" stroke="rgba(0,255,136,0.2)" stroke-width="1"/>
    <text x="141" y="21" font-family="monospace" font-size="12" fill="#00ff88" text-anchor="middle" font-weight="600">Tokens</text>

    <rect x="202" y="0" width="66" height="32" rx="8" fill="rgba(0,255,136,0.08)" stroke="rgba(0,255,136,0.2)" stroke-width="1"/>
    <text x="235" y="21" font-family="monospace" font-size="12" fill="#00ff88" text-anchor="middle" font-weight="600">DeFi</text>

    <rect x="284" y="0" width="60" height="32" rx="8" fill="rgba(0,255,136,0.08)" stroke="rgba(0,255,136,0.2)" stroke-width="1"/>
    <text x="314" y="21" font-family="monospace" font-size="12" fill="#00ff88" text-anchor="middle" font-weight="600">NFT</text>

    <rect x="360" y="0" width="100" height="32" rx="8" fill="rgba(0,255,136,0.08)" stroke="rgba(0,255,136,0.2)" stroke-width="1"/>
    <text x="410" y="21" font-family="monospace" font-size="12" fill="#00ff88" text-anchor="middle" font-weight="600">Programs</text>

    <rect x="476" y="0" width="100" height="32" rx="8" fill="rgba(0,255,136,0.08)" stroke="rgba(0,255,136,0.2)" stroke-width="1"/>
    <text x="526" y="21" font-family="monospace" font-size="12" fill="#00ff88" text-anchor="middle" font-weight="600">Analytics</text>

    <rect x="592" y="0" width="90" height="32" rx="8" fill="rgba(0,255,136,0.08)" stroke="rgba(0,255,136,0.2)" stroke-width="1"/>
    <text x="637" y="21" font-family="monospace" font-size="12" fill="#00ff88" text-anchor="middle" font-weight="600">Network</text>
  </g>

  <!-- Install command -->
  <g transform="translate(100, 510)">
    <rect x="0" y="0" width="550" height="50" rx="10" fill="#12121a" stroke="#1e1e30" stroke-width="1"/>
    <text x="20" y="32" font-family="monospace" font-size="15" fill="#00ff88">$</text>
    <text x="40" y="32" font-family="monospace" font-size="15" fill="#e4e4ef"> npx @visioneth/solana-mcp@latest</text>
  </g>

  <!-- visioneth branding -->
  <text x="1100" y="590" font-family="monospace" font-size="16" fill="#555570" text-anchor="end" font-weight="600">visioneth</text>

  <!-- Accent bar bottom -->
  <rect x="0" y="626" width="1200" height="4" fill="url(#grad)"/>
</svg>
